version: "3.6"
services:
  dockerhost:
    image: qoomon/docker-host
    container_name: genesis_dockerhost
    cap_add: ["NET_ADMIN", "NET_RAW"]
    restart: on-failure
  redis:
    image: redis:alpine
    container_name: genesis_redis
    ports:
      - ${REDIS_PORT}:${REDIS_PORT}
    environment:
      name: ${REDIS_NAME}
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/var/lib/redis/data
    labels:
      - "traefik.enable=false"
  postgres:
    image: kartoza/postgis
    # image: postgres
    container_name: genesis_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PORT: ${POSTGRES_PORT}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - ${POSTGRES_PORT}:${POSTGRES_PORT}
    labels:
      - "traefik.enable=false"
  hasura:
    image: hasura/graphql-engine:latest
    container_name: genesis_hasura
    ports:
      - ${HASURA_GRAPHQL_SERVER_PORT}:${HASURA_GRAPHQL_SERVER_PORT}
    depends_on:
      - "postgres"
    restart: always
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      HASURA_GRAPHQL_ENABLE_CONSOLE: ${HASURA_GRAPHQL_ENABLE_CONSOLE:-true} # set to "false" to disable console
      ## uncomment next line to set an admin secret
      # HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_GRAPHQL_ADMIN_SECRET:-genesis@Xtrios}
      HASURA_GRAPHQL_SERVER_PORT: ${HASURA_GRAPHQL_SERVER_PORT:-8080}
      HASURA_GRAPHQL_ACCESS_KEY: ${HASURA_GRAPHQL_ACCESS_KEY:-genesis@Xtrios}
      HASURA_GRAPHQL_JWT_SECRET: '{"type":"HS256","key":"${HASURA_GRAPHQL_JWT_SECRET}"}'
      # HASURA_GRAPHQL_AUTH_HOOK: ${HASURA_GRAPHQL_AUTH_HOOK:-http://localhost:4000/auth/hasura}
      # HASURA_GRAPHQL_AUTH_HOOK_MODE: ${HASURA_GRAPHQL_AUTH_HOOK_MODE:-POST}
      HASURA_GRAPHQL_CORS_DOMAIN: ${HASURA_GRAPHQL_CORS_DOMAIN:-https://*.genesis.in,http://*.genesis.in,http://localhost:5000,http://localhost:3000,http://localhost:9695}

    labels:
      - "traefik.port=8080"
      # - "traefik.docker.network=traefik_default"
      - "traefik.frontend.rule=Host:hasura.test.genesis.in"
  pgadmin:
    container_name: pgadmin_container
    image: dpage/pgadmin4:4.6
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@genesis.org}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    volumes:
      - pgadmin:/root/.pgadmin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - "postgres"
    restart: unless-stopped

volumes:
  db_data:
  redis-data:
  pgadmin:
