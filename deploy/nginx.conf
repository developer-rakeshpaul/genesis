events {
    worker_connections 409600;
}
http {
    proxy_cache_path /data/nginx/cache levels=1:2 keys_zone=nuxt-cache:25m max_size=1g inactive=60m use_temp_path=off;
    map $sent_http_content_type $expires {
        "text/html" 1h;
        "text/html; charset=utf-8" 1h;
        default 7d;
    }
    server {
        listen 80;
        server_name test.parkmee.in;
        gzip on;
        gzip_types text/plain application/xml text/css application/javascript;
        gzip_min_length 1000;
        charset utf-8;
        root /home/parkmee/app/packages/web;
        location ~* \.(?:ico|gif|jpe?g|png|woff2?|eot|otf|ttf|svg|js|css)$ {
            expires $expires;
            add_header Pragma public;
            add_header Cache-Control "public";
            try_files $uri $uri/ @proxy;
        }
        location / {
            expires $expires;
# add_header Content-Security-Policy "default-src 'self' 'unsafe-inline';";
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header X-Frame-Options "SAMEORIGIN";
            try_files $uri $uri/index.html @proxy;
        }
        location @proxy {
            expires $expires;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
            add_header X-Frame-Options "SAMEORIGIN";
            add_header X-Cache-Status $upstream_cache_status;
            proxy_redirect off;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
            proxy_ignore_headers Cache-Control;
            proxy_http_version 1.1;
            proxy_read_timeout 1m;
            proxy_connect_timeout 1m;
            proxy_pass http://nuxt:3000;
            proxy_cache nuxt-cache;
            proxy_cache_bypass $arg_nocache;
            proxy_cache_valid 200 302  60m;
            proxy_cache_valid 404      1m;
            proxy_cache_lock on;
            proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
            proxy_cache_key $uri$is_args$args;
        }
    }
    server {
        listen 80;
        server_name hasura.test.parkmee.in;
        gzip on;
        gzip_types text/plain application/xml text/css application/javascript;
        gzip_min_length 1000;
        location / {
            expires $expires;
            proxy_redirect off;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-NginX-Proxy true;
            proxy_read_timeout 1m;
            proxy_connect_timeout 1m;
            proxy_pass http://hasura:8080;
        }
    }
    server {
        listen 80;
        server_name api.test.parkmee.in;
        gzip on;
        gzip_types text/plain application/xml text/css application/javascript;
        gzip_min_length 1000;
        location / {
            expires $expires;
            proxy_redirect off;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-NginX-Proxy true;
            proxy_read_timeout 1m;
            proxy_connect_timeout 1m;
            proxy_pass http://typeql:4000;
        }
    }
}
