version: "3.6"
services:
  edge:
    image: traefik
    command:
      # tag::traefik-entrypoints-http[]
      # - "--entryPoints=Name:http Address::80 Redirect.EntryPoint:https"
      # end::traefik-entrypoints-http[]
      # tag::traefik-entrypoints-https[]
      # - "--entryPoints=Name:https Address::443 TLS"
      # - "--defaultEntryPoints=https,http"
      # end::traefik-entrypoints-https[]
      # tag::traefik-entrypoints-acme[]
      # - "--acme"
      # - "--acme.entryPoint=https"         # Uses LE certificates on the entrypoint "https" .
      # - "--acme.email=moburaparkingsolution@gmail.com" # Specifies the contact email for the certificates.
      # - "--acme.storage=acme.json"        # Stores certificates in the file "acme.storage".
      # - "--acme.caServer=https://acme-staging-v02.api.letsencrypt.org/directory"
      # - "--acme.tlsChallenge=true"        # Uses TLS Challenge.
      # - "--acme.onHostRule=true"          # Get cert's domain names from frontend rules.
      # - "--acme.onDemand=false"

      # end::traefik-entrypoints-acme[]
      - "--docker"
    ports:
      - "80:80" # The HTTP port
      - "443:443" # The HTTPS port
    volumes:
      # To communicate with the Docker Engine
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/traefik/traefik.toml:/traefik.toml
      # - /opt/traefik/acme.json:/acme.json

    networks:
      - web
  # end::edge[]

  redis:
    image: bitnami/redis
    container_name: genesis_redis
    ports:
      - ${REDIS_PORT}:${REDIS_PORT}
    environment:
      name: ${REDIS_NAME}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    labels:
      - "traefik.enable=false"
    networks:
      - web
  # end::redis[]
  # tag::postgres[]
  postgres:
    image: kartoza/postgis
    # image: postgres
    container_name: genesis_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PORT: ${POSTGRES_PORT}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - ${POSTGRES_PORT}:${POSTGRES_PORT}
    labels:
      - "traefik.enable=false"
    networks:
      - web
  # end::postgres[]
  # tag::hasura[]
  hasura:
    image: hasura/graphql-engine:v1.0.0-beta.3
    container_name: genesis_hasura
    ports:
      - ${HASURA_GRAPHQL_SERVER_PORT}:${HASURA_GRAPHQL_SERVER_PORT}
    depends_on:
      - "postgres"
    restart: always
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      HASURA_GRAPHQL_ENABLE_CONSOLE: ${HASURA_GRAPHQL_ENABLE_CONSOLE:-true} # set to "false" to disable console
      ## uncomment next line to set an admin secret
      # HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_GRAPHQL_ADMIN_SECRET:-genesis@Xtrios}
      HASURA_GRAPHQL_SERVER_PORT: ${HASURA_GRAPHQL_SERVER_PORT:-8080}
      HASURA_GRAPHQL_ACCESS_KEY: ${HASURA_GRAPHQL_ACCESS_KEY:-genesis@Xtrios}
      HASURA_GRAPHQL_JWT_SECRET: ${HASURA_GRAPHQL_JWT_SECRET:-"{"type":"HS256","key":"MWM4NzgyMDYtYjIzNC00MGUwLTlhNzAtNmQ0Y2U5ZmIxZDBmQu4nF7EdAh8s3TwpHwrdWT6R"}"}
      # HASURA_GRAPHQL_AUTH_HOOK: ${HASURA_GRAPHQL_AUTH_HOOK:-http://localhost:4000/auth/hasura}
      # HASURA_GRAPHQL_AUTH_HOOK_MODE: ${HASURA_GRAPHQL_AUTH_HOOK_MODE:-POST}
      HASURA_GRAPHQL_CORS_DOMAIN: ${HASURA_GRAPHQL_CORS_DOMAIN:-https://*.genesis.in,http://*.genesis.in,http://localhost:3000}
    labels:
      - "traefik.port=8080"
      # - "traefik.docker.network=traefik_default"
      - "traefik.frontend.rule=Host:hasura.test.genesis.in"
    networks:
      - web
volumes:
  db_data:
networks:
  web:
    external: true
